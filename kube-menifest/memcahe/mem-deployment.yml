apiVersion: apps/v1
kind: Deployment
metadata:
  name: memcache-deployment
  namespace: prod
  labels:
    app: memcahe
    author: Tawfeeq
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mem-dep
  strategy:
    type: RollingUpdate:
      rollingUpdate:
        maxUnavailabel: 1
        maxSurge: 1
  template:
    metadata:
      labels:
        app: mem-dep
    spec:
      containers:
        - name: memcache
          image: memcached
          ports:
            - name: mem-port
              containerPort: 11211
          resources:
            requests:
              cpu: 150m
              memory: 120Mi
            limits:
              cpu: 250m
              memory: 240Mi

         livenessProbe:
           httpGet:
             path: /
             port: 11211
           initiaDelaySeconds: 10
           periodSeconds: 5

        readinessProbe:
          httpGet:
            path: /
            port: 11211
          initialDelaySeconds: 10
          periodSeconds: 5

