apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-deployment
  namespace: prod
  labels:
    app: web
    author: Tawfeeq
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web-dep
  startegy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: web-dep
    spec:
      containers:
        - name: web
          image: tawfeeq421/java-web
          ports:
            - name: web-port
              containerPort: 80
          reources:
            requests:
              cpu: 150m
              memory: 120Mi
            limits:
              cpu: 250m
              memory: 240Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
          readinessProbe:
            httpeGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
